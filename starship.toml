# Starship config - optimized for backend development

command_timeout = 500

# Minimal, relevant info only
format = """
$directory\
$git_branch\
$git_status\
$java\
$kotlin\
$golang\
$python\
$nodejs\
$docker_context\
$line_break\
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 25
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = '\$'
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# Language versions - only show when relevant
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "*.java"]
detect_folders = ["src/main/java", ".gradle"]

[kotlin]
symbol = "🅺 "
style = "bold purple"
format = "[$symbol($version )]($style)"
detect_files = ["build.gradle.kts", "*.kt", "settings.gradle.kts"]

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

# Context-aware modules
[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = false

[time]
disabled = true
