# Prefix: C-a is more ergonomic than C-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse
set -g mouse on

# Reduce escape time — critical for nvim responsiveness
set -sg escape-time 0

# Start indices at 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Large history
set -g history-limit 100000

# Vi keys in copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Splits that inherit current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window with current path
bind c new-window -c "#{pane_current_path}"
bind C-p previous-window
bind C-n next-window
bind Space last-window

# Show a prompt to kill a window by id prefix+x
bind-key X command-prompt -p "Kill window: " "kill-window -t '%%'"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Open Lazygit
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Fix claudecode
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Minimal status bar — session name left, time right
set -g status on
set -g status-style "bg=default,fg=colour244"
set -g status-left "#[bold,fg=colour75]#{session_name} "
set -g status-right "#[fg=colour244]%H:%M"
set -g status-left-length 30
set -g window-status-current-format "#[fg=colour75,bold]#I:#W"
set -g window-status-format "#[fg=colour244]#I:#W"

# Activity monitoring (no visual bell)
set -g monitor-activity on
set -g visual-activity off

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Session persistence
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
